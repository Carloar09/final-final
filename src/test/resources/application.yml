spring:
  datasource:
    url: jdbc:h2:mem:sistemahr;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
app:
  jwt-secret: ${JWT_SECRET:}
  jwt-expiration-minutes: 60
  upload-dir: target/test-uploads
  cors-allowed-origins: http://localhost:5173,http://127.0.0.1:5173
  initial-admin-password:
  cookie-secure: false
  attendance:
    start-time: "09:00"
    late-tolerance-minutes: 10
