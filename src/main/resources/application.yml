spring:
  application:
    name: sistema-hr
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 8MB

server:
  port: ${PORT:${SERVER_PORT:8080}}

app:
  jwt-secret: ${JWT_SECRET}
  jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES:480}
  upload-dir: ${UPLOAD_DIR:uploads}
  cors-allowed-origins: ${CORS_ALLOWED_ORIGINS}
  initial-admin-password: ${INITIAL_ADMIN_PASSWORD:}
  cookie-secure: ${COOKIE_SECURE:true}
  attendance:
    start-time: ${ATTENDANCE_START_TIME:09:00}
    late-tolerance-minutes: ${ATTENDANCE_LATE_TOLERANCE_MINUTES:10}
